name: Android CI - Build APK/AAB

on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK/AAB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm ci

      - name: Build web app (Next) for production
        run: |
          npm run build

      - name: Create placeholder web assets for Capacitor
        run: |
          mkdir -p out
          cat > out/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Minar Go App</title>
              <script>window.location.replace('https://minar-go-app.vercel.app');</script>
            </head>
            <body>
              <h1>Redirecting to Minar Go App...</h1>
              <p>If you are not redirected, <a href="https://minar-go-app.vercel.app">click here</a>.</p>
            </body>
          </html>
          EOF

      - name: Sync Capacitor Android
        run: |
          npx cap sync android

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute to gradlew
        run: |
          if [ -f android/gradlew ]; then chmod +x android/gradlew; fi

      - name: Build Release APK/AAB
        working-directory: android
        run: |
          if [ -f gradlew ]; then
            ./gradlew assembleRelease || ./gradlew bundleRelease || true
          else
            echo "No gradlew found, skipping Android native build.";
          fi

      - name: Upload APK/AAB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-artifacts
          path: |
            android/app/build/outputs/**/*.apk
            android/app/build/outputs/**/*.aab
