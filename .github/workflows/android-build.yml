name: Android CI - Build APK/AAB

on:
  push:
    branches:
      - main
      - android-mobile-ui-fix
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK/AAB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm ci

      - name: Build web app (Next) for production
        run: |
          npm run build

      - name: Create placeholder web assets for Capacitor
        run: |
          mkdir -p out
          cat > out/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Minar Go App</title>
              <script>window.location.replace('https://minar-go-app.vercel.app');</script>
            </head>
            <body>
              <h1>Redirecting to Minar Go App...</h1>
              <p>If you are not redirected, <a href="https://minar-go-app.vercel.app">click here</a>.</p>
            </body>
          </html>
          EOF

      - name: Sync Capacitor Android
        run: |
          npx cap sync android

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute to gradlew
        run: |
          if [ -f android/gradlew ]; then chmod +x android/gradlew; fi

      - name: Build Android APK/AAB
        working-directory: android
        run: |
          if [ -f gradlew ]; then
            ./gradlew assembleDebug
            ./gradlew assembleRelease || true
          else
            echo "No gradlew found, skipping Android native build.";
          fi

      - name: Upload APK/AAB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-artifacts
          path: |
            android/app/build/outputs/**/*.apk
            android/app/build/outputs/**/*.aab

      - name: Create GitHub release
        if: github.event_name == 'workflow_dispatch' || github.ref_name == 'main' || github.ref_name == 'android-mobile-ui-fix'
        id: release
        uses: actions/create-release@v1
        with:
          tag_name: apk-${{ github.run_number }}-${{ github.ref_name }}
          release_name: APK build ${{ github.run_number }} (branch: ${{ github.ref_name }})
          body: |
            Automated Android build from branch `${{ github.ref_name }}`.
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload debug APK to release
        if: steps.release.outputs.upload_url != ''
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: android/app/build/outputs/apk/debug/app-debug.apk
          asset_name: app-debug.apk
          asset_content_type: application/vnd.android.package-archive
